services:
  - type: web
    name: driftdater
    runtime: python

    # Build: install Python deps only. The Vue SPA (dist/) is pre-built locally
    # and committed to git, so Node.js is not needed on Render's build server.
    buildCommand: "pip install -r requirements.txt"

    # Start: run migrations, seed sample data (skips existing rows), then launch gunicorn.
    # --workers 2 --threads 2  safe for Render's free tier (0.1 CPU / 512 MB RAM).
    # --timeout 120            prevents worker kills during cold-start DB migrations.
    startCommand: "flask db upgrade && python seed.py && gunicorn --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT app:app"

    envVars:
      # Required by Flask CLI for `flask db upgrade` in the start command.
      - key: FLASK_APP
        value: app

      # Tell Flask it is running in production; enables the SECRET_KEY guard.
      - key: FLASK_ENV
        value: production

      # Render auto-generates a cryptographically secure random value.
      # Never set this manually — let Render manage it.
      - key: SECRET_KEY
        generateValue: true

      # Injected automatically by Render from the attached PostgreSQL database.
      - key: DATABASE_URL
        fromDatabase:
          name: drift_dater_db
          property: connectionString

      # Cloudinary credentials — set these manually in the Render dashboard.
      # Do NOT commit real values here; mark them sync: false so Render does
      # not try to sync them from this file.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Restrict CORS to the production frontend URL.
      # Update this value to your actual Render service URL after first deploy.
      - key: CORS_ORIGINS
        value: https://info3180-project-1-4z3c.onrender.com/

databases:
  - name: drift_dater_db
    type: postgresql
    databaseName: group_project
    plan: free
